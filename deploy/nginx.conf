# vladcealicu.com — HTTPS (managed by golive.sh)

limit_req_zone $binary_remote_addr zone=vladcealicu_limit:10m rate=10r/s;

# HTTP → HTTPS redirect (both naked and www)
server {
    listen 80;
    listen [::]:80;
    server_name vladcealicu.com www.vladcealicu.com;
    return 301 https://www.vladcealicu.com$request_uri;
}

# HTTPS naked → www redirect
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vladcealicu.com;

    ssl_certificate /etc/letsencrypt/live/vladcealicu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vladcealicu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.vladcealicu.com$request_uri;
}

# Main server block
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.vladcealicu.com;

    ssl_certificate /etc/letsencrypt/live/vladcealicu.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vladcealicu.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    root /var/www/vladcealicu.com/public;
    index index.html;

    access_log off;
    error_log /var/log/nginx/vladcealicu.com.error.log crit;

    limit_req zone=vladcealicu_limit burst=20 nodelay;
    server_tokens off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css text/javascript text/plain text/xml
               application/javascript application/json application/ld+json
               application/xml image/svg+xml font/woff font/woff2;

    # HTML — never cache
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Static assets — cache forever
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    # Try files
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Block hidden files
    location ~ /\. { deny all; }

    # Block WordPress probes
    location ~* (wp-admin|wp-login|\.php$) { deny all; }

    error_page 404 /error/404.html;
}
